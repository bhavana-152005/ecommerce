version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: bellevouix_store
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      MYSQL_URL: jdbc:mysql://db:3306/bellevouix_store
      MYSQL_USER: root
      MYSQL_PASSWORD: example
      MYSQL_REQUIRED: "false"
      SEIRRAA_LLM_PROVIDER: local
    depends_on:
      - db

volumes:
  db_data:
